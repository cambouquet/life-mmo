<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
<defs>
  <linearGradient id="hg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#5028b8"/>
    <stop offset="100%" stop-color="#0c031a"/>
  </linearGradient>
  <linearGradient id="jg" x1="1" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#5898ff"/>
    <stop offset="45%" stop-color="#1e52c8"/>
    <stop offset="100%" stop-color="#08183c"/>
  </linearGradient>
  <linearGradient id="ag" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#3a68c0"/>
    <stop offset="100%" stop-color="#081438"/>
  </linearGradient>
  <linearGradient id="ng" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#3a5a9a"/>
    <stop offset="100%" stop-color="#14204a"/>
  </linearGradient>
  <linearGradient id="kg" x1="1" y1="0" x2="0" y2="0">
    <stop offset="0%" stop-color="#8890b8"/>
    <stop offset="45%" stop-color="#eeeefc"/>
    <stop offset="100%" stop-color="#a8a8c8"/>
  </linearGradient>
  <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#9030d8"/>
    <stop offset="100%" stop-color="#481090"/>
  </linearGradient>
</defs>
<g transform="scale(2)">

<!-- BACK OF HEAD -->
<ellipse cx="8" cy="3" rx="4.3" ry="3.2" fill="url(#hg)" stroke="#09031a" stroke-width="0.5"/>
<ellipse cx="7.2" cy="1.5" rx="1.6" ry="0.65" fill="#7045d0" opacity="0.7"/>
<ellipse cx="9.6" cy="1.2" rx="1" ry="0.42" fill="#5838b8" opacity="0.55"/>
<line x1="8" y1="0.4" x2="8" y2="3.5" stroke="#6038c0" stroke-width="0.4" opacity="0.5"/>
<path d="M5,1.5 Q6.5,2.5 6,4.5" fill="none" stroke="#180830" stroke-width="0.3" opacity="0.6"/>
<path d="M11,1.5 Q9.5,2.5 10,4.5" fill="none" stroke="#180830" stroke-width="0.3" opacity="0.6"/>

<rect x="3.4" y="4.5" width="1.5" height="2.5" rx="0.75" fill="#0c031a"/>
<rect x="11.1" y="4.5" width="1.5" height="2.5" rx="0.75" fill="#0c031a"/>

<rect x="6.9" y="6.85" width="2.2" height="0.85" rx="0.35" fill="#e8b888" stroke="#09031a" stroke-width="0.25"/>

<rect x="4.3" y="7.3" width="7.4" height="1.4" rx="0.85" fill="url(#cg)" stroke="#09031a" stroke-width="0.45"/>
<ellipse cx="8" cy="8.6" rx="1.1" ry="0.3" fill="#481090" opacity="0.6"/>

<!-- left arm (swings forward - lower) -->
<rect x="1.6" y="9.2" width="2.15" height="4.1" rx="0.95" fill="url(#ag)" stroke="#09031a" stroke-width="0.4"/>
<rect x="3.0" y="9.5" width="0.55" height="3.1" rx="0.28" fill="#70a8ff" opacity="0.38"/>

<!-- right arm (swings back - higher) -->
<rect x="12.25" y="8.1" width="2.15" height="3.7" rx="0.95" fill="url(#ag)" stroke="#09031a" stroke-width="0.4"/>
<rect x="12.35" y="8.4" width="0.55" height="2.7" rx="0.28" fill="#050e28" opacity="0.45"/>

<!-- torso back -->
<path d="M4,8.5 Q8,7.9 12,8.5 L12,13 Q8,13.35 4,13 Z" fill="url(#jg)" stroke="#09031a" stroke-width="0.5"/>
<path d="M10.1,8.7 L11.7,8.5 L11.7,12.9 L10.1,13.05 Z" fill="#70a8ff" opacity="0.32"/>
<line x1="8" y1="8.5" x2="8" y2="13" stroke="#0a2060" stroke-width="0.32" opacity="0.48"/>
<line x1="4.2" y1="11.8" x2="11.8" y2="11.8" stroke="#09031a" stroke-width="0.45" opacity="0.55"/>
<rect x="7.45" y="11.6" width="1.1" height="0.65" rx="0.2" fill="#1a3080" stroke="#09031a" stroke-width="0.22"/>

<!-- hands -->
<ellipse cx="2.68" cy="13.5" rx="1.08" ry="0.85" fill="#e8b888" stroke="#09031a" stroke-width="0.28"/>
<ellipse cx="13.32" cy="12.0" rx="1.08" ry="0.85" fill="#e8b888" stroke="#09031a" stroke-width="0.28"/>

<!-- LEFT leg forward (stepped, lower) -->
<rect x="3.7" y="13.3" width="3.5" height="2.0" rx="0.6" fill="url(#ng)" stroke="#09031a" stroke-width="0.4"/>
<ellipse cx="5.45" cy="13.8" rx="1.2" ry="0.44" fill="#4870b8" opacity="0.62"/>

<!-- RIGHT leg back (raised, higher) -->
<rect x="8.8" y="12.6" width="3.3" height="1.85" rx="0.6" fill="url(#ng)" stroke="#09031a" stroke-width="0.4"/>
<ellipse cx="10.45" cy="13.05" rx="1.1" ry="0.42" fill="#4870b8" opacity="0.55"/>

<line x1="8" y1="12.8" x2="8" y2="15" stroke="#101830" stroke-width="0.48"/>

<!-- left shoe (forward, lower) -->
<rect x="2.8" y="15.1" width="4.6" height="0.95" rx="0.52" fill="url(#kg)" stroke="#09031a" stroke-width="0.38"/>
<line x1="3.2" y1="15.58" x2="7.0" y2="15.58" stroke="#9090b8" stroke-width="0.28" opacity="0.72"/>

<!-- right shoe (back, higher) -->
<rect x="8.6" y="14.35" width="4.3" height="0.9" rx="0.52" fill="url(#kg)" stroke="#09031a" stroke-width="0.38"/>
<line x1="9.0" y1="14.82" x2="12.5" y2="14.82" stroke="#9090b8" stroke-width="0.28" opacity="0.72"/>
</g>
</svg>
