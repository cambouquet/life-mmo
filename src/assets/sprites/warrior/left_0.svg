<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
<defs>
  <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#fef0dc"/>
    <stop offset="55%" stop-color="#f8c898"/>
    <stop offset="100%" stop-color="#be8048"/>
  </linearGradient>
  <linearGradient id="hg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#5028b8"/>
    <stop offset="100%" stop-color="#0c031a"/>
  </linearGradient>
  <linearGradient id="jg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#5898ff"/>
    <stop offset="45%" stop-color="#1e52c8"/>
    <stop offset="100%" stop-color="#08183c"/>
  </linearGradient>
  <linearGradient id="ag" x1="1" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#4070c8"/>
    <stop offset="100%" stop-color="#081438"/>
  </linearGradient>
  <linearGradient id="ng" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#3a5a9a"/>
    <stop offset="100%" stop-color="#14204a"/>
  </linearGradient>
  <linearGradient id="kg" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#8890b8"/>
    <stop offset="45%" stop-color="#eeeefc"/>
    <stop offset="100%" stop-color="#a8a8c8"/>
  </linearGradient>
  <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#9030d8"/>
    <stop offset="100%" stop-color="#481090"/>
  </linearGradient>
</defs>
<g transform="scale(2)">

<!-- HAIR back-of-head mass (right side of sprite) -->
<ellipse cx="9.8" cy="2.6" rx="3.4" ry="3" fill="url(#hg)" stroke="#09031a" stroke-width="0.5"/>
<ellipse cx="10.8" cy="1.4" rx="1.5" ry="0.6" fill="#7045d0" opacity="0.68"/>
<!-- hair texture -->
<path d="M8.5,1.2 Q10,2 10.5,4" fill="none" stroke="#180830" stroke-width="0.3" opacity="0.55"/>

<!-- HAIR forelock (small front lock above forehead) -->
<ellipse cx="5.2" cy="1.8" rx="1.4" ry="1.2" fill="#180830" stroke="#09031a" stroke-width="0.4"/>
<ellipse cx="4.8" cy="1.5" rx="0.7" ry="0.5" fill="#5028b8" opacity="0.6"/>

<!-- FACE OVAL (profile, slightly left of center) -->
<ellipse cx="6.6" cy="4.8" rx="2.5" ry="2.9" fill="url(#sg)" stroke="#09031a" stroke-width="0.5"/>
<!-- forehead highlight -->
<ellipse cx="6.5" cy="3.3" rx="1.2" ry="0.6" fill="#ffffff" opacity="0.28"/>

<!-- NOSE (tip protrudes left) -->
<path d="M4.3,5.2 Q4.0,5.6 4.4,5.95" fill="none" stroke="#c88050" stroke-width="0.5" stroke-linecap="round"/>
<ellipse cx="4.35" cy="5.6" rx="0.35" ry="0.45" fill="#c08050" opacity="0.4"/>

<!-- POINTED HYLIAN EAR (far ear, right side, left-facing profile) -->
<polygon points="8.88,4.18 9.0,5.58 10.9,3.72" fill="#f0c090" stroke="#09031a" stroke-width="0.32"/>
<line x1="9.15" y1="4.62" x2="10.45" y2="4.02" stroke="#c08050" stroke-width="0.24" opacity="0.6"/>
<ellipse cx="9.18" cy="4.88" rx="0.3" ry="0.48" fill="#d8a870" opacity="0.65"/>

<!-- EYEBROW (left profile - one brow visible) -->
<path d="M5.5,3.6 Q6.4,3.1 7.2,3.5" stroke="#24103a" stroke-width="0.62" fill="none" stroke-linecap="round"/>

<!-- EYE (large vivid, Zelda chibi style) -->
<ellipse cx="6.5" cy="4.35" rx="1.05" ry="0.98" fill="#e8d8f8" stroke="#09031a" stroke-width="0.3"/>
<ellipse cx="6.42" cy="4.42" rx="0.7" ry="0.8" fill="#180820"/>
<ellipse cx="6.4" cy="4.18" rx="0.38" ry="0.26" fill="#7040d8" opacity="0.82"/>
<path d="M5.55,3.88 Q6.5,3.44 7.45,3.88" fill="none" stroke="#09031a" stroke-width="0.4"/>
<path d="M5.68,5.02 Q6.5,5.28 7.32,5.02" fill="none" stroke="#09031a" stroke-width="0.2" opacity="0.5"/>
<circle cx="6.72" cy="4.1" r="0.22" fill="#fff"/>
<circle cx="6.28" cy="4.65" r="0.1" fill="#fff" opacity="0.7"/>

<!-- MOUTH -->
<path d="M5.1,6.3 Q5.8,6.85 6.8,6.5" fill="none" stroke="#c06858" stroke-width="0.5" stroke-linecap="round"/>

<!-- CHIN jaw line -->
<path d="M4.5,6.8 Q5.2,7.5 6.8,7.5" fill="none" stroke="#c08050" stroke-width="0.3" opacity="0.45"/>

<!-- NECK -->
<rect x="6" y="7.4" width="2.2" height="1.0" rx="0.4" fill="#f0c090" stroke="#09031a" stroke-width="0.28"/>

<!-- COLLAR (gold trim) -->
<rect x="4.2" y="7.9" width="7.6" height="1.5" rx="0.85" fill="url(#cg)" stroke="#09031a" stroke-width="0.45"/>
<path d="M4.5,8.04 Q8,7.62 11.5,8.04" fill="none" stroke="#f0c840" stroke-width="0.3" opacity="0.85"/>
<line x1="8" y1="7.9" x2="8" y2="9.4" stroke="#9e36d8" stroke-width="0.4"/>

<!-- FRONT ARM (character's left arm, swings forward to left) -->
<rect x="1.5" y="9" width="2.1" height="4.0" rx="0.95" fill="url(#ag)" stroke="#09031a" stroke-width="0.4"/>
<rect x="1.8" y="9.3" width="0.65" height="3" rx="0.32" fill="#70a8ff" opacity="0.42"/>

<!-- BACK ARM silhouette (right arm, slightly visible behind body on right) -->
<rect x="12.3" y="9.2" width="1.8" height="3.5" rx="0.8" fill="#0c2058" stroke="#09031a" stroke-width="0.35"/>

<!-- TORSO (side view - same width for this art style) -->
<path d="M4,9 Q8,8.3 12,9 L12,13.2 Q8,13.5 4,13.2 Z" fill="url(#jg)" stroke="#09031a" stroke-width="0.5"/>
<!-- left chest highlight (catching light from left since facing left) -->
<path d="M4.2,9.2 L5.8,9 L5.8,13 L4.2,13.2 Z" fill="#70a8ff" opacity="0.38"/>
<line x1="8" y1="9" x2="8" y2="13.2" stroke="#0a2060" stroke-width="0.3" opacity="0.45"/>
<line x1="4.2" y1="12.1" x2="11.8" y2="12.1" stroke="#09031a" stroke-width="0.42" opacity="0.55"/>
<rect x="7.38" y="11.82" width="1.24" height="0.7" rx="0.22" fill="#f0b820" stroke="#09031a" stroke-width="0.22"/>
<rect x="7.6" y="11.98" width="0.8" height="0.36" rx="0.1" fill="#ffe060" opacity="0.9"/>

<!-- front hand -->
<ellipse cx="2.58" cy="13.2" rx="1.05" ry="0.85" fill="#f0c090" stroke="#09031a" stroke-width="0.28"/>
<!-- back hand (darker, behind) -->
<ellipse cx="13.15" cy="12.9" rx="0.88" ry="0.7" fill="#d8a870" stroke="#09031a" stroke-width="0.25"/>

<!-- FRONT LEG (character's left, stepping toward left = front of movement) -->
<rect x="3.5" y="13" width="4.2" height="2.0" rx="0.65" fill="url(#ng)" stroke="#09031a" stroke-width="0.4"/>
<ellipse cx="5.6" cy="13.5" rx="1.3" ry="0.44" fill="#4870b8" opacity="0.62"/>

<!-- BACK LEG (character's right, slightly behind and darker) -->
<rect x="7.8" y="13" width="4.0" height="1.9" rx="0.6" fill="#1e305a" stroke="#09031a" stroke-width="0.35"/>
<ellipse cx="9.8" cy="13.48" rx="1.1" ry="0.38" fill="#38508a" opacity="0.55"/>

<!-- overlap: front leg over back leg at junction -->
<line x1="7.8" y1="13" x2="7.8" y2="14.9" stroke="#09031a" stroke-width="0.3"/>

<!-- FRONT SHOE -->
<rect x="2.8" y="14.85" width="5.2" height="1.0" rx="0.52" fill="url(#kg)" stroke="#09031a" stroke-width="0.38"/>
<line x1="3.2" y1="15.38" x2="7.6" y2="15.38" stroke="#7070a0" stroke-width="0.25" opacity="0.7"/>

<!-- BACK SHOE (darker) -->
<rect x="7.6" y="14.82" width="4.5" height="0.92" rx="0.48" fill="#9090b8" stroke="#09031a" stroke-width="0.32"/>
</g>
</svg>
