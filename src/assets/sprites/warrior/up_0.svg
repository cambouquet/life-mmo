<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
<defs>
  <linearGradient id="hg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#5028b8"/>
    <stop offset="100%" stop-color="#0c031a"/>
  </linearGradient>
  <linearGradient id="jg" x1="1" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#5898ff"/>
    <stop offset="45%" stop-color="#1e52c8"/>
    <stop offset="100%" stop-color="#08183c"/>
  </linearGradient>
  <linearGradient id="ag" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#3a68c0"/>
    <stop offset="100%" stop-color="#081438"/>
  </linearGradient>
  <linearGradient id="ng" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#3a5a9a"/>
    <stop offset="100%" stop-color="#14204a"/>
  </linearGradient>
  <linearGradient id="kg" x1="1" y1="0" x2="0" y2="0">
    <stop offset="0%" stop-color="#8890b8"/>
    <stop offset="45%" stop-color="#eeeefc"/>
    <stop offset="100%" stop-color="#a8a8c8"/>
  </linearGradient>
  <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#9030d8"/>
    <stop offset="100%" stop-color="#481090"/>
  </linearGradient>
</defs>
<g transform="scale(2)">

<!-- BACK OF HEAD: big hair oval (from above) -->
<ellipse cx="8" cy="3" rx="4.3" ry="3.2" fill="url(#hg)" stroke="#09031a" stroke-width="0.5"/>
<!-- hair sheen lines (from above, center part) -->
<ellipse cx="7.2" cy="1.5" rx="1.6" ry="0.65" fill="#7045d0" opacity="0.7"/>
<ellipse cx="9.6" cy="1.2" rx="1" ry="0.42" fill="#5838b8" opacity="0.55"/>
<!-- subtle center highlight line -->
<line x1="8" y1="0.4" x2="8" y2="3.5" stroke="#6038c0" stroke-width="0.4" opacity="0.5"/>
<!-- hair texture curves (hair flow from above) -->
<path d="M5,1.5 Q6.5,2.5 6,4.5" fill="none" stroke="#180830" stroke-width="0.3" opacity="0.6"/>
<path d="M11,1.5 Q9.5,2.5 10,4.5" fill="none" stroke="#180830" stroke-width="0.3" opacity="0.6"/>

<!-- hair side falls (behind the body sides) -->
<rect x="3.4" y="4.5" width="1.5" height="2.5" rx="0.75" fill="#0c031a"/>
<rect x="11.1" y="4.5" width="1.5" height="2.5" rx="0.75" fill="#0c031a"/>
<!-- POINTED EAR TIPS visible from back (peeking behind hair) -->
<polygon points="3.5,5.0 2.2,4.1 2.75,6.1" fill="#f0c090" stroke="#09031a" stroke-width="0.38"/>
<polygon points="12.5,5.0 13.8,4.1 13.25,6.1" fill="#f0c090" stroke="#09031a" stroke-width="0.38"/>

<!-- neck (barely visible between hair and collar) -->
<rect x="6.9" y="6.85" width="2.2" height="0.85" rx="0.35" fill="#e8b888" stroke="#09031a" stroke-width="0.25"/>

<!-- collar (back view) -->
<rect x="4.3" y="7.3" width="7.4" height="1.4" rx="0.85" fill="url(#cg)" stroke="#09031a" stroke-width="0.45"/>
<ellipse cx="8" cy="8.6" rx="1.1" ry="0.3" fill="#481090" opacity="0.6"/>

<!-- left arm (back view, highlights on inner edge) -->
<rect x="1.6" y="8.5" width="2.15" height="4.0" rx="0.95" fill="url(#ag)" stroke="#09031a" stroke-width="0.4"/>
<rect x="3.0" y="8.8" width="0.55" height="3" rx="0.28" fill="#70a8ff" opacity="0.38"/>

<!-- right arm -->
<rect x="12.25" y="8.5" width="2.15" height="4.0" rx="0.95" fill="url(#ag)" stroke="#09031a" stroke-width="0.4"/>
<rect x="12.35" y="8.8" width="0.55" height="3" rx="0.28" fill="#050e28" opacity="0.45"/>

<!-- torso back (back seam, no sigil) -->
<path d="M4,8.5 Q8,7.9 12,8.5 L12,13 Q8,13.35 4,13 Z" fill="url(#jg)" stroke="#09031a" stroke-width="0.5"/>
<path d="M10.1,8.7 L11.7,8.5 L11.7,12.9 L10.1,13.05 Z" fill="#70a8ff" opacity="0.32"/>
<line x1="8" y1="8.5" x2="8" y2="13" stroke="#0a2060" stroke-width="0.32" opacity="0.48"/>
<line x1="4.2" y1="11.8" x2="11.8" y2="11.8" stroke="#09031a" stroke-width="0.45" opacity="0.55"/>
<rect x="7.38" y="11.52" width="1.24" height="0.7" rx="0.22" fill="#f0b820" stroke="#09031a" stroke-width="0.22"/>
<rect x="7.6" y="11.68" width="0.8" height="0.36" rx="0.1" fill="#ffe060" opacity="0.9"/>

<!-- hands (back) -->
<ellipse cx="2.68" cy="12.7" rx="1.08" ry="0.85" fill="#e8b888" stroke="#09031a" stroke-width="0.28"/>
<ellipse cx="13.32" cy="12.7" rx="1.08" ry="0.85" fill="#e8b888" stroke="#09031a" stroke-width="0.28"/>

<!-- legs (same as front) -->
<rect x="4" y="12.8" width="3.4" height="1.95" rx="0.6" fill="url(#ng)" stroke="#09031a" stroke-width="0.4"/>
<rect x="8.6" y="12.8" width="3.4" height="1.95" rx="0.6" fill="url(#ng)" stroke="#09031a" stroke-width="0.4"/>
<line x1="8" y1="12.8" x2="8" y2="14.75" stroke="#101830" stroke-width="0.48"/>
<ellipse cx="5.7" cy="13.25" rx="1.15" ry="0.44" fill="#4870b8" opacity="0.62"/>
<ellipse cx="10.3" cy="13.25" rx="1.15" ry="0.44" fill="#4870b8" opacity="0.62"/>

<!-- shoes (back - heels visible, reversed gradient direction) -->
<rect x="3.1" y="14.65" width="4.45" height="1.0" rx="0.52" fill="url(#kg)" stroke="#09031a" stroke-width="0.38"/>
<rect x="8.45" y="14.65" width="4.45" height="1.0" rx="0.52" fill="url(#kg)" stroke="#09031a" stroke-width="0.38"/>
<!-- heel accent line -->
<line x1="3.4" y1="15.0" x2="7.2" y2="15.0" stroke="#9090b8" stroke-width="0.28" opacity="0.75"/>
<line x1="8.75" y1="15.0" x2="12.6" y2="15.0" stroke="#9090b8" stroke-width="0.28" opacity="0.75"/>
</g>
</svg>
