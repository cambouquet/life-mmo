<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
<defs>
  <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#fef0dc"/>
    <stop offset="55%" stop-color="#f8c898"/>
    <stop offset="100%" stop-color="#be8048"/>
  </linearGradient>
  <linearGradient id="hg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#5028b8"/>
    <stop offset="100%" stop-color="#0c031a"/>
  </linearGradient>
  <linearGradient id="jg" x1="1" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#5898ff"/>
    <stop offset="45%" stop-color="#1e52c8"/>
    <stop offset="100%" stop-color="#08183c"/>
  </linearGradient>
  <linearGradient id="ag" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#4070c8"/>
    <stop offset="100%" stop-color="#081438"/>
  </linearGradient>
  <linearGradient id="ng" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#3a5a9a"/>
    <stop offset="100%" stop-color="#14204a"/>
  </linearGradient>
  <linearGradient id="kg" x1="1" y1="0" x2="0" y2="0">
    <stop offset="0%" stop-color="#8890b8"/>
    <stop offset="55%" stop-color="#eeeefc"/>
    <stop offset="100%" stop-color="#a8a8c8"/>
  </linearGradient>
  <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#9030d8"/>
    <stop offset="100%" stop-color="#481090"/>
  </linearGradient>
</defs>
<g transform="scale(2)">

<!-- hair back (left) -->
<ellipse cx="6.2" cy="2.6" rx="3.4" ry="3" fill="url(#hg)" stroke="#09031a" stroke-width="0.5"/>
<ellipse cx="5.2" cy="1.4" rx="1.5" ry="0.6" fill="#7045d0" opacity="0.68"/>
<path d="M7.5,1.2 Q6,2 5.5,4" fill="none" stroke="#180830" stroke-width="0.3" opacity="0.55"/>

<!-- hair forelock (right) -->
<ellipse cx="10.8" cy="1.8" rx="1.4" ry="1.2" fill="#180830" stroke="#09031a" stroke-width="0.4"/>
<ellipse cx="11.2" cy="1.5" rx="0.7" ry="0.5" fill="#5028b8" opacity="0.6"/>

<!-- face -->
<ellipse cx="9.4" cy="4.8" rx="2.5" ry="2.9" fill="url(#sg)" stroke="#09031a" stroke-width="0.5"/>
<ellipse cx="9.5" cy="3.3" rx="1.2" ry="0.6" fill="#ffffff" opacity="0.28"/>

<!-- nose -->
<path d="M11.7,5.2 Q12.0,5.6 11.6,5.95" fill="none" stroke="#c88050" stroke-width="0.5" stroke-linecap="round"/>
<ellipse cx="11.65" cy="5.6" rx="0.35" ry="0.45" fill="#c08050" opacity="0.4"/>

<!-- ear -->
<ellipse cx="6.9" cy="4.9" rx="0.72" ry="0.98" fill="#f0c090" stroke="#09031a" stroke-width="0.3"/>
<ellipse cx="6.9" cy="4.9" rx="0.4" ry="0.55" fill="#d8a870" opacity="0.7"/>

<!-- eyebrow -->
<path d="M10.5,3.6 Q9.6,3.1 8.8,3.5" stroke="#24103a" stroke-width="0.62" fill="none" stroke-linecap="round"/>

<!-- eye -->
<ellipse cx="9.5" cy="4.35" rx="0.92" ry="0.85" fill="#ddd0ee" stroke="#09031a" stroke-width="0.28"/>
<ellipse cx="9.6" cy="4.4" rx="0.6" ry="0.68" fill="#180820"/>
<path d="M8.65,3.95 Q9.5,3.55 10.35,3.95" fill="none" stroke="#24103a" stroke-width="0.3"/>
<circle cx="9.38" cy="4.15" r="0.2" fill="#fff"/>

<!-- mouth -->
<path d="M10.9,6.3 Q10.2,6.85 9.2,6.5" fill="none" stroke="#c06858" stroke-width="0.5" stroke-linecap="round"/>

<!-- neck -->
<rect x="7.8" y="7.4" width="2.2" height="1.0" rx="0.4" fill="#f0c090" stroke="#09031a" stroke-width="0.28"/>

<!-- collar -->
<rect x="4.2" y="7.9" width="7.6" height="1.5" rx="0.85" fill="url(#cg)" stroke="#09031a" stroke-width="0.45"/>
<line x1="8" y1="7.9" x2="8" y2="9.4" stroke="#9e36d8" stroke-width="0.4"/>

<!-- back arm (left, swings forward = lower during stride) -->
<rect x="1.9" y="9.5" width="1.8" height="3.8" rx="0.8" fill="#0c2058" stroke="#09031a" stroke-width="0.35"/>

<!-- front arm (right, swings back = higher during stride) -->
<rect x="12.4" y="8.5" width="2.1" height="3.7" rx="0.95" fill="url(#ag)" stroke="#09031a" stroke-width="0.4"/>
<rect x="13.85" y="8.8" width="0.55" height="2.7" rx="0.28" fill="#70a8ff" opacity="0.42"/>

<!-- torso -->
<path d="M4,9 Q8,8.3 12,9 L12,13.2 Q8,13.5 4,13.2 Z" fill="url(#jg)" stroke="#09031a" stroke-width="0.5"/>
<path d="M11.7,9.2 L10.1,9 L10.1,13 L11.7,13.2 Z" fill="#70a8ff" opacity="0.38"/>
<line x1="8" y1="9" x2="8" y2="13.2" stroke="#0a2060" stroke-width="0.3" opacity="0.45"/>
<line x1="4.2" y1="12.1" x2="11.8" y2="12.1" stroke="#09031a" stroke-width="0.42" opacity="0.55"/>
<rect x="7.45" y="11.9" width="1.1" height="0.62" rx="0.2" fill="#1a3080" stroke="#09031a" stroke-width="0.22"/>

<!-- back hand (left arm swings forward, lower) -->
<ellipse cx="2.85" cy="13.5" rx="0.88" ry="0.7" fill="#d8a870" stroke="#09031a" stroke-width="0.25"/>
<!-- front hand (right arm swings back, higher) -->
<ellipse cx="13.42" cy="12.38" rx="1.05" ry="0.85" fill="#f0c090" stroke="#09031a" stroke-width="0.28"/>

<!-- back leg (left, now lower - strides forward on opposite side) -->
<rect x="4.2" y="12.6" width="4.0" height="1.85" rx="0.6" fill="#1e305a" stroke="#09031a" stroke-width="0.35"/>
<ellipse cx="6.2" cy="13.05" rx="1.1" ry="0.38" fill="#38508a" opacity="0.55"/>

<!-- front leg (right, raised/back) -->
<rect x="8.8" y="13.3" width="4.2" height="2.1" rx="0.65" fill="url(#ng)" stroke="#09031a" stroke-width="0.4"/>
<ellipse cx="10.9" cy="13.82" rx="1.3" ry="0.44" fill="#4870b8" opacity="0.62"/>

<line x1="8.2" y1="13" x2="8.2" y2="15" stroke="#09031a" stroke-width="0.3"/>

<!-- back shoe (left, lower/extended) -->
<rect x="3.9" y="14.37" width="4.5" height="0.92" rx="0.48" fill="#9090b8" stroke="#09031a" stroke-width="0.32"/>

<!-- front shoe (right, lower during stride) -->
<rect x="8.6" y="15.25" width="5.2" height="1.0" rx="0.52" fill="url(#kg)" stroke="#09031a" stroke-width="0.38"/>
<line x1="9.0" y1="15.78" x2="13.4" y2="15.78" stroke="#7070a0" stroke-width="0.25" opacity="0.7"/>
</g>
</svg>
