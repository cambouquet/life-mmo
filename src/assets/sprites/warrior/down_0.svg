<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
<defs>
  <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#fef0dc"/>
    <stop offset="55%" stop-color="#f8c898"/>
    <stop offset="100%" stop-color="#c07848"/>
  </linearGradient>
  <linearGradient id="hg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#6030d0"/>
    <stop offset="35%" stop-color="#180830"/>
    <stop offset="100%" stop-color="#0c031a"/>
  </linearGradient>
  <linearGradient id="jg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#60a8ff"/>
    <stop offset="45%" stop-color="#2060d0"/>
    <stop offset="100%" stop-color="#08183c"/>
  </linearGradient>
  <linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#4878d0"/>
    <stop offset="100%" stop-color="#0a1840"/>
  </linearGradient>
  <linearGradient id="ng" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#4060a0"/>
    <stop offset="100%" stop-color="#14204a"/>
  </linearGradient>
  <linearGradient id="kg" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#9090c0"/>
    <stop offset="45%" stop-color="#f0f0ff"/>
    <stop offset="100%" stop-color="#b0b0d0"/>
  </linearGradient>
  <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#9030d8"/>
    <stop offset="100%" stop-color="#4a1090"/>
  </linearGradient>
  <radialGradient id="eg" cx="0.4" cy="0.3" r="0.65">
    <stop offset="0%" stop-color="#8040e8"/>
    <stop offset="50%" stop-color="#4010a0"/>
    <stop offset="100%" stop-color="#180828"/>
  </radialGradient>
</defs>
<g transform="scale(2)">

<!-- HAIR back mass -->
<ellipse cx="8" cy="3.4" rx="4.5" ry="3.8" fill="url(#hg)" stroke="#09031a" stroke-width="0.5"/>
<!-- hair crown sheen -->
<ellipse cx="6.5" cy="1.6" rx="1.8" ry="0.78" fill="#7845e0" opacity="0.78"/>
<ellipse cx="9.7" cy="1.2" rx="1.1" ry="0.48" fill="#6038c0" opacity="0.65"/>
<!-- hair texture lines -->
<path d="M4.5,1.8 Q5.1,3 4.9,5.2" fill="none" stroke="#3a1880" stroke-width="0.38" opacity="0.65"/>
<path d="M11.5,1.8 Q10.9,3 11.1,5.2" fill="none" stroke="#3a1880" stroke-width="0.38" opacity="0.65"/>
<!-- hair sidelocks flanking face -->
<rect x="3.6" y="3.0" width="1.2" height="4.8" rx="0.6" fill="#0c031a" stroke="#09031a" stroke-width="0.28"/>
<rect x="11.2" y="3.0" width="1.2" height="4.8" rx="0.6" fill="#0c031a" stroke="#09031a" stroke-width="0.28"/>

<!-- POINTED HYLIAN EARS (behind face oval) -->
<polygon points="4.58,4.8 3.1,3.55 3.82,5.78" fill="#f8c898" stroke="#09031a" stroke-width="0.42"/>
<line x1="4.28" y1="4.42" x2="3.55" y2="4.05" stroke="#c08050" stroke-width="0.25" opacity="0.55"/>
<polygon points="11.42,4.8 12.9,3.55 12.18,5.78" fill="#f8c898" stroke="#09031a" stroke-width="0.42"/>
<line x1="11.72" y1="4.42" x2="12.45" y2="4.05" stroke="#c08050" stroke-width="0.25" opacity="0.55"/>

<!-- FACE / HEAD (large, round chibi) -->
<ellipse cx="8" cy="4.8" rx="3.3" ry="3.05" fill="url(#sg)" stroke="#09031a" stroke-width="0.5"/>
<!-- forehead highlight -->
<ellipse cx="7.5" cy="3.2" rx="1.5" ry="0.65" fill="#ffffff" opacity="0.28"/>

<!-- EYEBROWS -->
<path d="M5.5,3.52 Q6.4,2.96 7.3,3.38" stroke="#1a0838" stroke-width="0.72" fill="none" stroke-linecap="round"/>
<path d="M8.7,3.38 Q9.6,2.96 10.5,3.52" stroke="#1a0838" stroke-width="0.72" fill="none" stroke-linecap="round"/>

<!-- LEFT EYE (large, vivid) -->
<ellipse cx="6.4" cy="4.52" rx="1.12" ry="1.05" fill="#e8d8f8" stroke="#09031a" stroke-width="0.32"/>
<ellipse cx="6.4" cy="4.6" rx="0.78" ry="0.88" fill="url(#eg)"/>
<ellipse cx="6.35" cy="4.28" rx="0.44" ry="0.30" fill="#9060e0" opacity="0.82"/>
<circle cx="6.72" cy="4.15" r="0.26" fill="#ffffff"/>
<circle cx="6.25" cy="4.72" r="0.13" fill="#ffffff" opacity="0.7"/>
<path d="M5.35,3.95 Q6.4,3.46 7.45,3.95" fill="none" stroke="#09031a" stroke-width="0.45"/>
<path d="M5.5,5.12 Q6.4,5.4 7.3,5.12" fill="none" stroke="#09031a" stroke-width="0.22" opacity="0.5"/>

<!-- RIGHT EYE -->
<ellipse cx="9.6" cy="4.52" rx="1.12" ry="1.05" fill="#e8d8f8" stroke="#09031a" stroke-width="0.32"/>
<ellipse cx="9.6" cy="4.6" rx="0.78" ry="0.88" fill="url(#eg)"/>
<ellipse cx="9.55" cy="4.28" rx="0.44" ry="0.30" fill="#9060e0" opacity="0.82"/>
<circle cx="9.92" cy="4.15" r="0.26" fill="#ffffff"/>
<circle cx="9.5" cy="4.72" r="0.13" fill="#ffffff" opacity="0.7"/>
<path d="M8.55,3.95 Q9.6,3.46 10.65,3.95" fill="none" stroke="#09031a" stroke-width="0.45"/>
<path d="M8.7,5.12 Q9.6,5.4 10.5,5.12" fill="none" stroke="#09031a" stroke-width="0.22" opacity="0.5"/>

<!-- NOSE -->
<path d="M7.5,5.78 Q8,6.15 8.5,5.78" fill="none" stroke="#c08050" stroke-width="0.38" stroke-linecap="round" opacity="0.6"/>

<!-- MOUTH (closed, gentle smile) -->
<path d="M7.0,6.58 Q8,7.25 9.0,6.58" fill="none" stroke="#d07060" stroke-width="0.55" stroke-linecap="round"/>
<path d="M7.35,6.98 Q8,7.14 8.65,6.98" fill="none" stroke="#b05050" stroke-width="0.28" stroke-linecap="round"/>

<!-- BLUSH cheeks -->
<ellipse cx="5.8" cy="5.42" rx="1.02" ry="0.46" fill="#ff8080" opacity="0.26"/>
<ellipse cx="10.2" cy="5.42" rx="1.02" ry="0.46" fill="#ff8080" opacity="0.26"/>

<!-- NECK -->
<rect x="6.9" y="7.85" width="2.2" height="1.05" rx="0.42" fill="#f8c898" stroke="#09031a" stroke-width="0.3"/>

<!-- COLLAR / SASH (purple, gold trim) -->
<rect x="4.0" y="8.55" width="8.0" height="1.58" rx="0.9" fill="url(#cg)" stroke="#09031a" stroke-width="0.48"/>
<path d="M4.3,8.68 Q8,8.22 11.7,8.68" fill="none" stroke="#f0c840" stroke-width="0.32" opacity="0.85"/>
<circle cx="8" cy="9.02" r="0.38" fill="#f8d848" stroke="#09031a" stroke-width="0.2"/>
<circle cx="8" cy="8.98" r="0.18" fill="#ffffff" opacity="0.85"/>
<line x1="8" y1="8.55" x2="8" y2="10.15" stroke="#9830d8" stroke-width="0.38"/>

<!-- LEFT ARM (swings forward — arm slightly lower) -->
<rect x="1.6" y="9.35" width="2.1" height="4.15" rx="0.95" fill="url(#ag)" stroke="#09031a" stroke-width="0.42"/>
<rect x="1.9" y="9.65" width="0.62" height="3.15" rx="0.31" fill="#80c0ff" opacity="0.42"/>

<!-- RIGHT ARM (swings back — arm slightly higher) -->
<rect x="12.3" y="8.65" width="2.1" height="3.85" rx="0.95" fill="url(#ag)" stroke="#09031a" stroke-width="0.42"/>
<rect x="13.65" y="8.95" width="0.58" height="2.85" rx="0.29" fill="#050e28" opacity="0.45"/>

<!-- TORSO -->
<path d="M3.8,9.25 Q8,8.55 12.2,9.25 L12.2,13.42 Q8,13.82 3.8,13.42 Z" fill="url(#jg)" stroke="#09031a" stroke-width="0.5"/>
<path d="M4.1,9.45 L5.8,9.2 L5.8,13.22 L4.1,13.42 Z" fill="#80c0ff" opacity="0.35"/>
<line x1="8" y1="9.25" x2="8" y2="13.42" stroke="#081840" stroke-width="0.3" opacity="0.55"/>
<line x1="4.0" y1="12.2" x2="12.0" y2="12.2" stroke="#09031a" stroke-width="0.48" opacity="0.65"/>
<!-- gold belt buckle -->
<rect x="7.38" y="11.96" width="1.24" height="0.72" rx="0.22" fill="#f0b820" stroke="#09031a" stroke-width="0.22"/>
<rect x="7.6" y="12.12" width="0.8" height="0.38" rx="0.1" fill="#ffe060" opacity="0.9"/>
<!-- magic sigil on chest -->
<circle cx="8" cy="10.72" r="1.42" fill="none" stroke="#c040ff" stroke-width="0.4" opacity="0.82"/>
<line x1="8" y1="9.3" x2="8" y2="12.14" stroke="#c040ff" stroke-width="0.3" opacity="0.68"/>
<line x1="6.58" y1="10.72" x2="9.42" y2="10.72" stroke="#c040ff" stroke-width="0.3" opacity="0.68"/>
<circle cx="8" cy="10.72" r="0.46" fill="#f090ff"/>

<!-- LEFT HAND (arm forward, lower) -->
<ellipse cx="2.65" cy="13.72" rx="1.08" ry="0.88" fill="#f8c898" stroke="#09031a" stroke-width="0.3"/>
<!-- RIGHT HAND (arm back, higher) -->
<ellipse cx="13.35" cy="12.72" rx="1.08" ry="0.88" fill="#f8c898" stroke="#09031a" stroke-width="0.3"/>

<!-- LEGS — opposite stride from down_1 (right leg forward this frame) -->
<!-- LEFT leg BACK (raised, higher) -->
<rect x="4.0" y="12.7" width="3.4" height="1.9" rx="0.6" fill="url(#ng)" stroke="#09031a" stroke-width="0.42"/>
<ellipse cx="5.7" cy="13.15" rx="1.1" ry="0.43" fill="#5880c0" opacity="0.58"/>
<!-- RIGHT leg FORWARD (lower) -->
<rect x="8.6" y="13.3" width="3.4" height="2.05" rx="0.6" fill="url(#ng)" stroke="#09031a" stroke-width="0.42"/>
<ellipse cx="10.3" cy="13.78" rx="1.15" ry="0.46" fill="#5880c0" opacity="0.65"/>
<line x1="8" y1="12.82" x2="8" y2="15.38" stroke="#101830" stroke-width="0.5"/>

<!-- SHOES -->
<!-- LEFT shoe (back, higher) -->
<rect x="3.1" y="14.52" width="4.4" height="0.95" rx="0.55" fill="url(#kg)" stroke="#09031a" stroke-width="0.4"/>
<line x1="3.5" y1="14.98" x2="7.2" y2="14.98" stroke="#8888b8" stroke-width="0.28" opacity="0.72"/>
<!-- RIGHT shoe (forward, lower) -->
<rect x="8.5" y="15.3" width="4.6" height="0.95" rx="0.55" fill="url(#kg)" stroke="#09031a" stroke-width="0.4"/>
<line x1="8.9" y1="15.75" x2="12.7" y2="15.75" stroke="#8888b8" stroke-width="0.28" opacity="0.72"/>
</g>
</svg>