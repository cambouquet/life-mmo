<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life MMO</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }

    #game-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header bar ── */
    #hud {
      display: flex;
      align-items: stretch;
      width: 960px;
      height: 64px;
      background: #0e0a1e;
      border: 2px solid #3a2060;
      border-bottom: 1px solid #2a1650;
      box-shadow: 0 0 24px #6020b044;
      overflow: hidden;
    }

    /* 1 – Logo */
    #logo-panel {
      flex: 0 0 110px;
      border-right: 1px solid #2a1650;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px;
    }
    #logo-canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      width: 96px;
      height: 52px;
    }

    /* 2 – Head + player info */
    #char-panel {
      flex: 0 0 190px;
      border-right: 1px solid #2a1650;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
    }
    #head-canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      width: 48px;
      height: 40px;
      border: 1px solid #5a3090;
      border-radius: 3px;
      background: #0a0616;
      box-shadow: 0 0 10px #8040c066, 0 0 3px #3a2060;
      flex-shrink: 0;
    }
    #char-name {
      color: #e8c8ff;
      font-size: 14px;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-shadow: 0 0 10px #c8a0f077;
    }
    #char-class {
      color: #7050a0;
      font-size: 8px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 3px;
    }

    /* 3 – Log (center, flex-grows) */
    #log-panel {
      flex: 1;
      border-right: 1px solid #2a1650;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 6px 10px;
      overflow: hidden;
    }
    #log-title {
      color: #5a3880;
      font-size: 8px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 3px;
    }
    #log-entries {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .log-line {
      color: #b090d0;
      font-size: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      animation: logFade 0.3s ease;
    }
    .log-line span { color: #e0b8ff; }
    @keyframes logFade { from { opacity:0; transform: translateY(3px); } to { opacity:1; transform: none; } }

    /* 4 – Clock */
    #clock-panel {
      flex: 0 0 130px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 4px 8px;
    }
    #clock-time {
      color: #c8a0f0;
      font-size: 14px;
      letter-spacing: 2px;
      text-shadow: 0 0 8px #c8a0f055;
    }
    #clock-date {
      color: #9070b8;
      font-size: 9px;
      letter-spacing: 1px;
    }

    canvas#game {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 2px solid #3a2060;
      border-top: none;
      box-shadow:
        0 0 0 1px #1a0a30,
        0 0 30px #6020b055,
        0 0 60px #3010601a;
    }

    #hint {
      margin-top: 10px;
      color: #6a507a;
      font-size: 11px;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div id="game-wrap">
    <!-- ── HUD Header ── -->
    <div id="hud">

      <!-- 1: Logo -->
      <div id="logo-panel">
        <canvas id="logo-canvas" width="48" height="26"></canvas>
      </div>

      <!-- 2: Head + player info -->
      <div id="char-panel">
        <canvas id="head-canvas" width="12" height="10"></canvas>
        <div>
          <div id="char-name">Kami</div>
          <div id="char-class">Warrior · Lv.1</div>
        </div>
      </div>

      <!-- 3: Log -->
      <div id="log-panel">
        <div id="log-title">» Activity Log</div>
        <div id="log-entries"></div>
      </div>

      <!-- 4: Clock -->
      <div id="clock-panel">
        <div id="clock-time">00:00:00</div>
        <div id="clock-date"></div>
      </div>

    </div>

    <canvas id="game"></canvas>
    <div id="hint">WASD / ARROW KEYS to move</div>
  </div>

  <script>
    // ─── Constants ────────────────────────────────────────────────────────────
    const TILE   = 16;        // px per tile (logical)
    const SCALE  = 3;         // display scale
    const COLS   = 20;
    const ROWS   = 14;
    const W      = COLS * TILE;
    const H      = ROWS * TILE;
    const SPEED  = 80;        // px/s (logical)

    // ─── Logo canvas ──────────────────────────────────────────────────────────
    (function drawLogo() {
      const lc = document.getElementById('logo-canvas');
      const lx = lc.getContext('2d');
      lx.imageSmoothingEnabled = false;
      const LW = lc.width, LH = lc.height; // 48×26
      lx.fillStyle = '#070512'; lx.fillRect(0, 0, LW, LH);
      const p = (x,y,c) => { lx.fillStyle=c; lx.fillRect(x,y,1,1); };

      // 5 stars, 4 lines — minimal constellation
      const S = [[2,12],[6,4],[12,8],[10,20],[18,14]];
      lx.save(); lx.globalAlpha=0.3; lx.strokeStyle='#9060d8'; lx.lineWidth=1;
      [[0,1],[1,2],[2,4],[2,3]].forEach(([a,b]) => {
        lx.beginPath(); lx.moveTo(S[a][0]+.5,S[a][1]+.5);
        lx.lineTo(S[b][0]+.5,S[b][1]+.5); lx.stroke();
      });
      lx.restore();

      for (const [x,y] of S) p(x,y,'#7050b8');
      // bright anchor star
      p(6,4,'#ffffff'); p(5,4,'#b898e8'); p(7,4,'#b898e8'); p(6,3,'#b898e8'); p(6,5,'#b898e8');

      // dotted separator
      for (let y=2; y<LH-2; y+=3) { lx.fillStyle='#2a1850'; lx.fillRect(22,y,1,2); }

      // 3×5 pixel font, scale 2 for LIFE, scale 1 for MMO
      const G = {
        L:['10','10','10','10','11'], I:['1','1','1','1','1'],
        F:['11','10','11','10','10'], E:['11','10','11','10','11'],
        M:['101','111','101','101','101'], O:['11','11','11','11','11'],
      };
      function drawStr(str, sx, sy, sc, col) {
        let cx = sx;
        for (const ch of str) {
          const rows = G[ch]; if (!rows) { cx+=3; continue; }
          rows.forEach((row,ry) => [...row].forEach((b,rx) => {
            if (b==='1') { lx.fillStyle=col; lx.fillRect(cx+rx*sc, sy+ry*sc, sc, sc); }
          }));
          cx += rows[0].length*sc + sc;
        }
      }
      drawStr('LIFE', 24,  3, 2, '#c8a8f0');
      drawStr('MMO',  24, 19, 1, '#6a48a0');
    })();

    // ─── Canvas setup ─────────────────────────────────────────────────────────
    const canvas = document.getElementById('game');
    canvas.width  = W;
    canvas.height = H;
    canvas.style.width  = W * SCALE + 'px';
    canvas.style.height = H * SCALE + 'px';
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    // ─── Colour palette (modern pixel art, muted purple/teal) ────────────────
    const PAL = {
      floorA:   '#1e1630',   // dark floor tile A
      floorB:   '#221a38',   // dark floor tile B
      wall:     '#0d0b1a',   // wall fill
      wallTop:  '#3a2868',   // wall top edge highlight
      wallFace: '#18123a',   // wall front face
      rug:      '#2a1848',   // central rug
      rugBord:  '#4a2878',   // rug border
      rugInner: '#382060',   // rug inner pattern
      light:    '#ffe8a022', // torchlight tint
      torch:    '#ffb830',   // torch flame
      torchGlo: '#ff840055', // torch glow
      wood:     '#5c3a1e',   // door/furniture wood
      woodDark: '#3d2510',
      metal:    '#7a8898',
      shadow:   '#00000060',
    };

    // ─── Room tile map  (0=floor, 1=wall, 2=door placeholder) ────────────────
    // Outer ring = walls, inside = floor
    const map = [];
    for (let r = 0; r < ROWS; r++) {
      map[r] = [];
      for (let c = 0; c < COLS; c++) {
        const edge = r === 0 || r === ROWS - 1 || c === 0 || c === COLS - 1;
        map[r][c] = edge ? 1 : 0;
      }
    }
    // Door gap on bottom wall
    map[ROWS - 1][Math.floor(COLS / 2)]     = 2;
    map[ROWS - 1][Math.floor(COLS / 2) + 1] = 2;

    // ─── Torches (col, row) ───────────────────────────────────────────────────
    const torches = [
      { c: 3,       r: 0 },
      { c: COLS - 4, r: 0 },
      { c: 0,       r: Math.floor(ROWS / 2) },
      { c: COLS - 1, r: Math.floor(ROWS / 2) },
    ];

    // ─── Player ───────────────────────────────────────────────────────────────
    const player = {
      x: (COLS / 2 - 0.5) * TILE,   // logical px
      y: (ROWS / 2 - 0.5) * TILE,
      w: TILE,
      h: TILE,
      frame: 0,
      frameTick: 0,
      facing: 'down',   // up | down | left | right
      moving: false,
    };

    // ─── Input ────────────────────────────────────────────────────────────────
    const keys = {};
    window.addEventListener('keydown', e => { keys[e.code] = true;  e.preventDefault(); });
    window.addEventListener('keyup',   e => { keys[e.code] = false; });

    function inputDir() {
      let dx = 0, dy = 0;
      if (keys['ArrowLeft']  || keys['KeyA']) dx = -1;
      if (keys['ArrowRight'] || keys['KeyD']) dx =  1;
      if (keys['ArrowUp']    || keys['KeyW']) dy = -1;
      if (keys['ArrowDown']  || keys['KeyS']) dy =  1;
      return { dx, dy };
    }

    // ─── Collision ────────────────────────────────────────────────────────────
    function tileAt(px, py) {
      const c = Math.floor(px / TILE);
      const r = Math.floor(py / TILE);
      if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return 1;
      return map[r][c];
    }

    function solidAt(px, py) {
      return tileAt(px, py) === 1;
    }

    function movePlayer(dx, dy, dt) {
      const margin = 2; // px inset from player edges
      const step   = SPEED * dt;
      const nx = player.x + dx * step;
      const ny = player.y + dy * step;
      const L  = nx + margin;
      const R  = nx + player.w - margin - 1;
      const T  = ny + margin;
      const B  = ny + player.h - margin - 1;

      if (dx !== 0) {
        const checkX = dx > 0 ? R : L;
        if (!solidAt(checkX, T) && !solidAt(checkX, B)) {
          player.x = nx;
        }
      }
      if (dy !== 0) {
        const checkY = dy > 0 ? B : T;
        if (!solidAt(L, checkY) && !solidAt(R, checkY)) {
          player.y = ny;
        }
      }
    }

    // ─── Draw helpers ─────────────────────────────────────────────────────────
    function rect(x, y, w, h, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x, y, w, h);
    }

    function pixel(x, y, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x, y, 1, 1);
    }

    // ─── Draw floor tile ──────────────────────────────────────────────────────
    function drawFloor(c, r) {
      const x = c * TILE, y = r * TILE;
      const color = (c + r) % 2 === 0 ? PAL.floorA : PAL.floorB;
      rect(x, y, TILE, TILE, color);
      // subtle grout lines
      ctx.fillStyle = '#00000018';
      ctx.fillRect(x, y, TILE, 1);
      ctx.fillRect(x, y, 1, TILE);
    }

    // ─── Draw wall tile ───────────────────────────────────────────────────────
    function drawWall(c, r) {
      const x = c * TILE, y = r * TILE;
      rect(x, y, TILE, TILE, PAL.wall);
      // top highlight edge (if tile above is also wall or out of bounds)
      rect(x, y, TILE, 3, PAL.wallTop);
      // stone texture dots
      ctx.fillStyle = '#ffffff06';
      ctx.fillRect(x + 3, y + 5,  4, 3);
      ctx.fillRect(x + 9, y + 9,  5, 3);
      ctx.fillRect(x + 2, y + 11, 3, 2);
    }

    // ─── Draw door gap ────────────────────────────────────────────────────────
    function drawDoor(c, r) {
      const x = c * TILE, y = r * TILE;
      // dark opening
      rect(x, y, TILE, TILE, '#080610');
      // door frame
      rect(x, y, 1, TILE, PAL.wood);
      rect(x + TILE - 1, y, 1, TILE, PAL.wood);
      rect(x, y, TILE, 2, PAL.wood);
    }

    // ─── Draw rug ─────────────────────────────────────────────────────────────
    function drawRug() {
      const rx = 5 * TILE, ry = 3 * TILE;
      const rw = 10 * TILE, rh = 8 * TILE;
      rect(rx, ry, rw, rh, PAL.rug);
      // border
      ctx.strokeStyle = PAL.rugBord;
      ctx.lineWidth = 1;
      ctx.strokeRect(rx + 1, ry + 1, rw - 2, rh - 2);
      ctx.strokeRect(rx + 3, ry + 3, rw - 6, rh - 6);
      // inner diamond
      ctx.strokeStyle = PAL.rugInner;
      const cx = rx + rw / 2, cy = ry + rh / 2;
      const s  = 28;
      ctx.beginPath();
      ctx.moveTo(cx,     cy - s);
      ctx.lineTo(cx + s, cy);
      ctx.lineTo(cx,     cy + s);
      ctx.lineTo(cx - s, cy);
      ctx.closePath();
      ctx.stroke();
      // corner dots
      for (const [ox, oy] of [[5,5],[rw-6,5],[5,rh-6],[rw-6,rh-6]]) {
        rect(rx + ox, ry + oy, 2, 2, PAL.rugBord);
      }
    }

    // ─── Draw torch ───────────────────────────────────────────────────────────
    let torchPhase = 0;
    function drawTorch(c, r, phase) {
      const x = c * TILE + TILE / 2;
      const y = r * TILE + TILE / 2;
      const flicker = Math.sin(phase) * 0.3 + 0.7;

      // glow (use globalAlpha trick)
      const grd = ctx.createRadialGradient(x, y, 1, x, y, TILE * 3);
      grd.addColorStop(0,   `rgba(255,180,48,${0.18 * flicker})`);
      grd.addColorStop(0.4, `rgba(255,120,20,${0.08 * flicker})`);
      grd.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.fillStyle = grd;
      ctx.fillRect(x - TILE * 3, y - TILE * 3, TILE * 6, TILE * 6);

      // bracket
      rect(x - 1, y - 2, 3, 5, PAL.metal);
      // flame body
      rect(x - 1, y - 5, 3, 4, PAL.torch);
      pixel(x, y - 6, '#fff5c0');
      pixel(x - 1, y - 5, '#ffcc44');
      pixel(x + 1, y - 5, '#ffcc44');
      // flicker tip
      if (flicker > 0.8) pixel(x, y - 7, '#ffffff88');
    }

    // ─── Draw player sprite (warrior) ────────────────────────────────────────
    // 16×16 top-down warrior: steel armour, pauldrons, helmet, sword (right)
    const PC = {
      skin:     '#f5c9a0',
      armor:    '#4a5868',   // steel plate
      armorLt:  '#7a8fa8',   // plate highlight
      armorDk:  '#2a3040',   // plate shadow
      belt:     '#8a6020',   // leather belt
      boot:     '#2a1e10',   // dark leather boots
      eye:      '#1a0a30',
      helm:     '#3a4858',   // helmet
      helmLt:   '#607080',   // helmet shine
      visor:    '#1a2530',   // visor slit
      sword:    '#c8d8e8',   // blade
      swordHlt: '#c8901a',   // hilt gold
      swordGrp: '#4a2810',   // grip
      shield:   '#3a4858',   // shield face
      shieldRim:'#c8901a',   // shield rim gold
      cape:     '#8a1010',   // cape red
      capeDk:   '#5a0808',
    };

    // Generic draw helpers that work on any ctx (used for head mini-canvas too)
    function drawWarriorSprite(targetCtx, x, y, facing, frame) {
      x = Math.floor(x);
      y = Math.floor(y);
      const bob = frame === 1 ? 1 : 0;

      const r2 = (ox, oy, w, h, color) => {
        targetCtx.fillStyle = color;
        targetCtx.fillRect(x + ox, y + oy, w, h);
      };
      const p2 = (ox, oy, color) => {
        targetCtx.fillStyle = color;
        targetCtx.fillRect(x + ox, y + oy, 1, 1);
      };

      if (facing === 'down') {
        // cape
        r2(3,  6 + bob, 10, 9, PC.cape);
        r2(4,  5 + bob,  8, 2, PC.capeDk);
        // body armour
        r2(4,  6 + bob,  8, 7, PC.armor);
        r2(5,  6 + bob,  6, 2, PC.armorLt);
        r2(5,  8 + bob,  1, 4, PC.armorLt);
        // belt
        r2(4, 12 + bob,  8, 2, PC.belt);
        // pauldrons
        r2(2,  6 + bob,  3, 4, PC.armorLt);
        r2(11, 6 + bob,  3, 4, PC.armorLt);
        // sword (right side)
        r2(13, 5 + bob,  1, 8, PC.sword);
        r2(12, 5 + bob,  1, 1, PC.sword);
        r2(12, 9 + bob,  3, 1, PC.swordHlt);
        r2(13, 10 + bob, 1, 3, PC.swordGrp);
        // shield (left side)
        r2(1,  6 + bob,  3, 5, PC.shield);
        r2(1,  6 + bob,  3, 1, PC.shieldRim);
        r2(1, 10 + bob,  3, 1, PC.shieldRim);
        p2(2,  8 + bob,             PC.shieldRim);
        // legs
        r2(4, 13 + bob,  3, 3, PC.armorDk);
        r2(9, 13 + bob,  3, 3, PC.armorDk);
        r2(4, 15 + bob,  3, 1, PC.boot);
        r2(9, 15 + bob,  3, 1, PC.boot);
        // head – helmet
        r2(4,  0,  8, 7, PC.helm);
        r2(4,  0,  8, 2, PC.helmLt);
        p2(5,  1, PC.armorLt); p2(10, 1, PC.armorLt);
        // visor slit
        r2(5,  4,  6, 1, PC.visor);
        // face below visor
        r2(5,  5,  6, 2, PC.skin);
        p2(6,  5, PC.eye); p2(9, 5, PC.eye);
      }

      if (facing === 'up') {
        // cape
        r2(3,  6 + bob, 10, 9, PC.cape);
        // body armour
        r2(4,  6 + bob,  8, 7, PC.armor);
        r2(4, 12 + bob,  8, 2, PC.belt);
        r2(2,  6 + bob,  3, 4, PC.armorLt);
        r2(11, 6 + bob,  3, 4, PC.armorLt);
        r2(13, 5 + bob,  1, 7, PC.sword);
        r2(12, 9 + bob,  3, 1, PC.swordHlt);
        r2(1,  6 + bob,  3, 5, PC.shield);
        r2(1,  6 + bob,  3, 1, PC.shieldRim);
        r2(1, 10 + bob,  3, 1, PC.shieldRim);
        r2(4, 13 + bob,  3, 2, PC.armorDk);
        r2(9, 13 + bob,  3, 2, PC.armorDk);
        r2(4, 15 + bob,  3, 1, PC.boot);
        r2(9, 15 + bob,  3, 1, PC.boot);
        // helmet back
        r2(4,  0,  8, 7, PC.helm);
        r2(4,  0,  8, 2, PC.helmLt);
        // back plume
        r2(7,  0,  2, 1, '#cc2020');
      }

      if (facing === 'left') {
        r2(3,  6 + bob,  9, 9, PC.cape);
        r2(4,  6 + bob,  7, 7, PC.armor);
        r2(4,  6 + bob,  5, 2, PC.armorLt);
        r2(4, 12 + bob,  7, 2, PC.belt);
        // shield (left = near side)
        r2(1,  6 + bob,  4, 5, PC.shield);
        r2(1,  6 + bob,  1, 5, PC.shieldRim);
        r2(1,  6 + bob,  4, 1, PC.shieldRim);
        r2(1, 10 + bob,  4, 1, PC.shieldRim);
        // sword tip poking out back
        r2(11, 8 + bob,  1, 5, PC.sword);
        r2(4, 13 + bob,  3, 2, PC.armorDk);
        r2(7, 13 + bob,  3, 2, PC.armorDk);
        r2(4, 15 + bob,  3, 1, PC.boot);
        r2(7, 15 + bob,  3, 1, PC.boot);
        r2(4,  0,  7, 7, PC.helm);
        r2(4,  0,  7, 2, PC.helmLt);
        r2(4,  4,  5, 1, PC.visor);
        r2(4,  5,  5, 2, PC.skin);
        p2(5,  5, PC.eye);
      }

      if (facing === 'right') {
        r2(4,  6 + bob,  9, 9, PC.cape);
        r2(5,  6 + bob,  7, 7, PC.armor);
        r2(7,  6 + bob,  5, 2, PC.armorLt);
        r2(5, 12 + bob,  7, 2, PC.belt);
        // shield (right = far side)
        r2(11, 6 + bob,  4, 5, PC.shield);
        r2(14, 6 + bob,  1, 5, PC.shieldRim);
        r2(11, 6 + bob,  4, 1, PC.shieldRim);
        r2(11,10 + bob,  4, 1, PC.shieldRim);
        // sword
        r2(4,  8 + bob,  1, 5, PC.sword);
        r2(4,  8 + bob,  1, 1, PC.sword);
        r2(5, 13 + bob,  3, 2, PC.armorDk);
        r2(8, 13 + bob,  3, 2, PC.armorDk);
        r2(5, 15 + bob,  3, 1, PC.boot);
        r2(8, 15 + bob,  3, 1, PC.boot);
        r2(5,  0,  7, 7, PC.helm);
        r2(5,  0,  7, 2, PC.helmLt);
        r2(7,  4,  5, 1, PC.visor);
        r2(7,  5,  4, 2, PC.skin);
        p2(10, 5, PC.eye);
      }
    }

    function drawPlayerSprite(x, y, facing, frame) {
      drawWarriorSprite(ctx, x, y, facing, frame);
    }

    // ─── Shadow under player ──────────────────────────────────────────────────
    function drawShadow(x, y) {
      ctx.save();
      ctx.globalAlpha = 0.35;
      ctx.fillStyle = '#000000';
      ctx.beginPath();
      ctx.ellipse(
        Math.floor(x) + TILE / 2,
        Math.floor(y) + TILE - 1,
        5, 2, 0, 0, Math.PI * 2
      );
      ctx.fill();
      ctx.restore();
    }

    // ─── Main render ─────────────────────────────────────────────────────────
    function render(torchPhase) {
      ctx.clearRect(0, 0, W, H);

      // Floor & walls
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const t = map[r][c];
          if      (t === 0) drawFloor(c, r);
          else if (t === 1) drawWall(c, r);
          else if (t === 2) drawDoor(c, r);
        }
      }

      // Rug (drawn over floor)
      drawRug();

      // Torches
      torches.forEach(t => drawTorch(t.c, t.r, torchPhase + t.c));

      // Shadow + player
      drawShadow(player.x, player.y);
      drawPlayerSprite(player.x, player.y, player.facing, player.frame);
    }

    // ─── Head portrait canvas (12×10 logical → CSS 48×40) ─────────────────────
    const headCanvas = document.getElementById('head-canvas');
    const headCtx    = headCanvas.getContext('2d');
    headCtx.imageSmoothingEnabled = false;

    function drawHead(tc, facing, expr) {
      tc.fillStyle = '#0a0616';
      tc.fillRect(0, 0, 12, 10);
      const r = (x, y, w, h, c) => { tc.fillStyle = c; tc.fillRect(x, y, w, h); };
      const p = (x, y, c)       => { tc.fillStyle = c; tc.fillRect(x, y, 1, 1); };
      // Eye pixel(s) vary by expression
      const eye = expr === 'blink' ? (x, y) => { /* closed */ r(x, y, 2, 1, '#5a3a2a'); }
                : expr === 'walk'  ? (x, y) => r(x, y, 2, 1, PC.eye)
                :                    (x, y) => p(x, y, PC.eye); // idle dot

      if (facing === 'down') {
        r(2, 1, 8, 7, PC.helm);
        r(2, 1, 8, 2, PC.helmLt);
        p(3, 2, PC.armorLt); p(8, 2, PC.armorLt);
        r(3, 5, 6, 1, PC.visor);
        r(3, 6, 6, 2, PC.skin);
        eye(4, 6); eye(7, 6);
      } else if (facing === 'up') {
        r(2, 1, 8, 7, PC.helm);
        r(2, 1, 8, 2, PC.helmLt);
        r(5, 0, 2, 2, '#cc2020'); // back plume
      } else if (facing === 'left') {
        r(2, 1, 7, 7, PC.helm);
        r(2, 1, 7, 2, PC.helmLt);
        r(2, 5, 5, 1, PC.visor);
        r(2, 6, 5, 2, PC.skin);
        eye(3, 6);
      } else if (facing === 'right') {
        r(3, 1, 7, 7, PC.helm);
        r(3, 1, 7, 2, PC.helmLt);
        r(5, 5, 5, 1, PC.visor);
        r(5, 6, 5, 2, PC.skin);
        eye(8, 6);
      }
    }

    let blinkTimer = 0, blinking = false;

    function updateHead(dt) {
      if (!player.moving) {
        blinkTimer += dt;
        if (blinkTimer > 3.5 && !blinking) {
          blinking = true;
          setTimeout(() => { blinking = false; blinkTimer = 0; }, 140);
        }
      } else {
        blinkTimer = 0; blinking = false;
      }
      const expr = blinking ? 'blink' : (player.moving ? 'walk' : 'idle');
      headCtx.clearRect(0, 0, 12, 10);
      drawHead(headCtx, player.facing, expr);
    }

    // ─── Log system ───────────────────────────────────────────────────────────
    const logEntries = document.getElementById('log-entries');
    const LOG_MAX = 3;

    function addLog(text) {
      const line = document.createElement('div');
      line.className = 'log-line';
      line.innerHTML = text;
      logEntries.prepend(line);
      while (logEntries.children.length > LOG_MAX) {
        logEntries.removeChild(logEntries.lastChild);
      }
    }

    // Starter log messages
    addLog('<span>Kami</span> enters the dungeon.');
    addLog('The torches flicker in the dark.');
    addLog('<span>System:</span> Move with WASD.');

    // Log when direction changes
    let lastFacing = '';
    const dirMsg = { down: 'moves <span>south</span>.', up: 'moves <span>north</span>.', left: 'moves <span>west</span>.', right: 'moves <span>east</span>.' };

    // ─── Clock ────────────────────────────────────────────────────────────────
    const clockTime = document.getElementById('clock-time');
    const clockDate = document.getElementById('clock-date');

    function updateClock() {
      const now = new Date();
      const hh  = String(now.getHours()).padStart(2, '0');
      const mm  = String(now.getMinutes()).padStart(2, '0');
      const ss  = String(now.getSeconds()).padStart(2, '0');
      clockTime.textContent = `${hh}:${mm}:${ss}`;
      const days   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      clockDate.textContent = `${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ─── Viewport fit (scales whole UI to window) ───────────────────────────
    function fitViewport() {
      const totalH = 56 + H * SCALE + 40;
      const totalW = W * SCALE;
      const s = Math.min(1,
        (window.innerHeight * 0.97) / totalH,
        (window.innerWidth  * 0.98) / totalW
      );
      document.getElementById('game-wrap').style.transform = `scale(${s})`;
    }
    window.addEventListener('resize', fitViewport);
    fitViewport();

    // ─── Game loop ────────────────────────────────────────────────────────────
    let last = 0;
    const FRAME_TIME = 0.18; // seconds per walk frame

    function loop(ts) {
      const dt = Math.min((ts - last) / 1000, 0.05);
      last = ts;

      torchPhase += dt * 4.5;

      const { dx, dy } = inputDir();
      player.moving = dx !== 0 || dy !== 0;

      if (player.moving) {
        if      (dy < 0) player.facing = 'up';
        else if (dy > 0) player.facing = 'down';
        else if (dx < 0) player.facing = 'left';
        else if (dx > 0) player.facing = 'right';

        movePlayer(dx, dy, dt);

        player.frameTick += dt;
        if (player.frameTick >= FRAME_TIME) {
          player.frameTick = 0;
          player.frame     = player.frame === 0 ? 1 : 0;
        }
      } else {
        player.frame     = 0;
        player.frameTick = 0;
      }

      // Log direction change
      if (player.moving && player.facing !== lastFacing) {
        addLog(`<span>Kami</span> ${dirMsg[player.facing]}`);
        lastFacing = player.facing;
      }

      updateHead(dt);
      render(torchPhase);
      requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);
  </script>
</body>
</html>
